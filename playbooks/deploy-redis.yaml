---
- name: Deploy Redis on EC2 fleet via SSM
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:

    - name: Install AWS CLI
      pip:
        name: awscli
        executable: pip3

    - name: Deploy Redis container on EC2 fleet
      shell: |
        python3 -m awscli ssm send-command \
        --document-name "AWS-RunShellScript" \
        --targets Key=tag:Role,Values=web-fleet \
        --parameters 'commands=[
        "sudo docker rm -f redis || true",
        "sudo docker pull redis:7",
        "sudo docker run -d -p 6379:6379 --name redis redis:7"
        ]' \
        --region us-east-1