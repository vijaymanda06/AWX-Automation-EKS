---
# ExternalSecret for AWX PostgreSQL connection (from RDS credentials secret)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: awx-postgres-configuration
  namespace: awx
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: awx-postgres-configuration
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        host: "{{ .host }}"
        port: "{{ .port }}"
        database: "{{ .dbname }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
        sslmode: "require"
        type: "unmanaged"
  data:
    - secretKey: host
      remoteRef:
        key: zerotrust/rds/awx-db-credentials
        property: host
    - secretKey: port
      remoteRef:
        key: zerotrust/rds/awx-db-credentials
        property: port
    - secretKey: dbname
      remoteRef:
        key: zerotrust/rds/awx-db-credentials
        property: dbname
    - secretKey: username
      remoteRef:
        key: zerotrust/rds/awx-db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: zerotrust/rds/awx-db-credentials
        property: password
---
# ExternalSecret for AWX admin password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: awx-admin-password
  namespace: awx
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: awx-admin-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: zerotrust/awx/admin-credentials
        property: password
